<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Beetles of Indiana — Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="/icon.png">
  <link href="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.css" rel="stylesheet">
  <link href="/admin/styles.css" rel="stylesheet">
</head>
<body>
  <!-- Site navigation bar that sits above Decap so editors can get back
       to /, /browse, /admin/discover, /admin/refresh without leaving the
       editor's domain. Decap's own AppHeader (Save, Publish, etc.) sits
       just underneath via CSS top-offset in styles.css. -->
  <header class="bin-admin-bar">
    <a href="/" class="bin-admin-brand">
      <img src="/images/insectID.png" alt="InsectID" class="bin-admin-logo">
      <span class="bin-admin-brand-name">Beetles of Indiana</span>
      <span class="bin-admin-brand-sub">Admin</span>
    </a>
    <nav class="bin-admin-nav">
      <a href="/" class="bin-admin-nav-link">← Back to site</a>
      <a href="/admin/discover" class="bin-admin-nav-link">Discover</a>
      <a href="/admin/refresh" class="bin-admin-nav-link">Refresh</a>
    </nav>
  </header>

  <!--
    Manual init: stop Decap from reading config.yml on load so we can register
    custom widgets first, then init. Without this, config.yml is validated
    before widgets.js runs and our widget types are not yet known.
  -->
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script src="/admin/widgets.js"></script>
  <script src="/admin/toolbar.js"></script>
  <script>window.CMS.init();</script>
</body>
</html>
